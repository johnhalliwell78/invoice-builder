databaseChangeLog:
  - changeSet:
      id: 0009-create-refresh-token
      author: invoice-builder
      changes:
        - createTable:
            tableName: refresh_token
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_refresh_token_user
                    referencedTableName: app_user
                    referencedColumnNames: id
                    deleteCascade: true
              - column:
                  name: token_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_refresh_token_hash
              - column:
                  name: expires_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: revoked_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - createIndex:
            tableName: refresh_token
            indexName: idx_refresh_token_user
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: refresh_token
            indexName: idx_refresh_token_expires
            columns:
              - column:
                  name: expires_at
