databaseChangeLog:
  - changeSet:
      id: 0014-create-product
      author: invoice-builder
      changes:
        - createTable:
            tableName: product
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_product_tenant
                    referencedTableName: tenant
                    referencedColumnNames: id
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: unit_price
                  type: NUMERIC(15,2)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: tax_rate
                  type: NUMERIC(5,2)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: category
                  type: VARCHAR(100)
              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - createIndex:
            tableName: product
            indexName: idx_product_tenant
            columns:
              - column:
                  name: tenant_id
        - createIndex:
            tableName: product
            indexName: idx_product_tenant_name
            columns:
              - column:
                  name: tenant_id
              - column:
                  name: name
