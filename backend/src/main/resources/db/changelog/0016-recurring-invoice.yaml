databaseChangeLog:
  - changeSet:
      id: 0016-create-recurring-invoice
      author: invoice-builder
      changes:
        - createTable:
            tableName: recurring_invoice
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_recurring_tenant
                    referencedTableName: tenant
                    referencedColumnNames: id
              - column:
                  name: customer_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_recurring_customer
                    referencedTableName: customer
                    referencedColumnNames: id
              - column:
                  name: frequency
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: anchor_day
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: next_run
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: auto_send
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: VARCHAR(3)
                  constraints:
                    nullable: false
              - column:
                  name: template
                  type: VARCHAR(50)
                  defaultValue: classic
                  constraints:
                    nullable: false
              - column:
                  name: due_days
                  type: INT
                  defaultValueNumeric: 30
                  constraints:
                    nullable: false
              - column:
                  name: discount_amount
                  type: NUMERIC(15,2)
                  defaultValueNumeric: 0
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: terms
                  type: TEXT
              - column:
                  name: line_items
                  type: JSONB
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: UUID
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - createIndex:
            tableName: recurring_invoice
            indexName: idx_recurring_tenant
            columns:
              - column:
                  name: tenant_id
        - createIndex:
            tableName: recurring_invoice
            indexName: idx_recurring_due
            columns:
              - column:
                  name: active
              - column:
                  name: next_run
