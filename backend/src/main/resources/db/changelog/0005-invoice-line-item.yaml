databaseChangeLog:
  - changeSet:
      id: 0005-create-invoice-line-item
      author: invoice-builder
      changes:
        - createTable:
            tableName: invoice_line_item
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: invoice_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_line_item_invoice
                    referencedTableName: invoice
                    referencedColumnNames: id
                    deleteCascade: true
              - column:
                  name: description
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: NUMERIC(10, 3)
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false
              - column:
                  name: unit_price
                  type: NUMERIC(15, 2)
                  constraints:
                    nullable: false
              - column:
                  name: tax_rate
                  type: NUMERIC(5, 2)
                  defaultValueNumeric: 0
              - column:
                  name: discount_percent
                  type: NUMERIC(5, 2)
                  defaultValueNumeric: 0
              - column:
                  name: amount
                  type: NUMERIC(15, 2)
                  constraints:
                    nullable: false
              - column:
                  name: sort_order
                  type: INTEGER
                  defaultValueNumeric: 0
        - createIndex:
            tableName: invoice_line_item
            indexName: idx_line_item_invoice
            columns:
              - column:
                  name: invoice_id
              - column:
                  name: sort_order
