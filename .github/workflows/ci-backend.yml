name: ci-backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # for GHCR push on main

defaults:
  run:
    working-directory: backend

jobs:
  build:
    name: build & test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: invoice_builder
          POSTGRES_USER: invoice
          POSTGRES_PASSWORD: invoice_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U invoice -d invoice_builder"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: jdbc:postgresql://localhost:5432/invoice_builder
      DATABASE_USER: invoice
      DATABASE_PASSWORD: invoice_secret
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci-jwt-secret-key-min-32-chars-long-for-hs256
      SPRING_PROFILES_ACTIVE: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Validate wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build & test
        run: ./gradlew --no-daemon check

      - name: Coverage report
        run: ./gradlew --no-daemon jacocoTestReport
        if: always()

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            backend/build/reports/tests/
            backend/build/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/build/reports/jacoco/test/
          retention-days: 7
          if-no-files-found: ignore

  docker:
    name: docker image
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./docker/Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
